name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs of the same workflow on the same branch when a
# new push lands. Saves CI minutes and surfaces only the freshest result.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        run: pytest -v

  docker-build:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: meowassist-bot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test imports inside the image
        run: |
          docker run --rm --entrypoint python meowassist-bot:ci -c "
          import payments, handlers, ai_engine, database, pricing
          import models_catalog, strings, middlewares, force_join, main
          from payments import verify_ipn_signature
          from force_join import RequiredChannelMiddleware
          assert callable(verify_ipn_signature)
          assert RequiredChannelMiddleware is not None
          print('all imports + verify_ipn_signature OK')
          "

  alembic:
    name: alembic upgrade/downgrade roundtrip
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: botuser
          POSTGRES_PASSWORD: testpw
          POSTGRES_DB: aibot_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U botuser -d aibot_db"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: botuser
      DB_PASSWORD: testpw
      DB_NAME: aibot_db

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install runtime deps (alembic + psycopg2)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: alembic upgrade head
        run: alembic upgrade head

      - name: Verify expected tables exist
        run: |
          PGPASSWORD=testpw psql -h localhost -U botuser -d aibot_db -tAc \
            "SELECT count(*) FROM information_schema.tables
             WHERE table_schema='public' AND table_name IN
               ('users','transactions','usage_logs','system_settings',
                'promo_codes','promo_usage','conversation_messages',
                'disabled_models','disabled_gateways')" \
            | grep -qx 9

      - name: alembic downgrade base
        run: alembic downgrade base

      - name: Verify all schema tables dropped
        run: |
          PGPASSWORD=testpw psql -h localhost -U botuser -d aibot_db -tAc \
            "SELECT count(*) FROM information_schema.tables
             WHERE table_schema='public' AND table_name IN
               ('users','transactions','usage_logs','system_settings',
                'promo_codes','promo_usage','conversation_messages',
                'disabled_models','disabled_gateways')" \
            | grep -qx 0
