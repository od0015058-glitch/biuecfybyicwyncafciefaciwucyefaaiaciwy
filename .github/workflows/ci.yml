name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs of the same workflow on the same branch when a
# new push lands. Saves CI minutes and surfaces only the freshest result.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        run: pytest -v

  docker-build:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: meowassist-bot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test imports inside the image
        run: |
          docker run --rm --entrypoint python meowassist-bot:ci -c "
          import payments, handlers, ai_engine, database, pricing
          import models_catalog, strings, middlewares, main
          from payments import verify_ipn_signature
          assert callable(verify_ipn_signature)
          print('all imports + verify_ipn_signature OK')
          "
