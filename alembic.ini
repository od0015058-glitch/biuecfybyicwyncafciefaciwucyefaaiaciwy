[alembic]
# Path to migration scripts (relative to this file).
script_location = alembic

# Naming for newly-generated revisions: zero-padded numeric prefix +
# slug. Keeps `ls alembic/versions/` sortable.
file_template = %%(rev)s_%%(slug)s

# Connection URL is built at runtime from DB_* env vars in alembic/env.py
# so the same migrations work locally, in CI, and in production without
# anyone editing this file.
sqlalchemy.url =

# Date / time format for autogenerated revisions.
timezone = UTC

# Don't truncate slug strings.
truncate_slug_length = 80

# Logging — minimal, only emit warnings unless verbose mode is on.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
