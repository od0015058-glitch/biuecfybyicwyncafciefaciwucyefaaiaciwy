[pytest]
testpaths = tests
addopts = -ra --strict-markers
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    error
    # asyncpg + python-dotenv emit ResourceWarning on import inside tests;
    # not interesting and not from our code.
    ignore::ResourceWarning
    # aiohttp's TestClient sometimes warns about unclosed transport
    # under pytest-aiohttp on Python 3.12 — not from our code.
    ignore::DeprecationWarning
