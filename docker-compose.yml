# docker-compose.yml — local + production deployment for the Meowassist bot.
#
# Usage:
#   1. cp .env.example .env   and fill in BOT_TOKEN / OPENROUTER_API_KEY /
#      NOWPAYMENTS_* / WEBHOOK_BASE_URL / DB_PASSWORD.
#   2. docker compose up -d --build
#   3. docker compose logs -f bot
#
# Replaces the `mv /root/bot_project /root/bot_project.broken` rollback
# pattern with `docker compose down` + `docker compose up -d`.
#
# DB_HOST is forced to `postgres` here so the bot resolves the service
# inside the compose network. Anything DB-related in .env is otherwise
# honoured (DB_USER, DB_PASSWORD, DB_NAME, DB_PORT).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${DB_USER:-botuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      POSTGRES_DB:       ${DB_NAME:-aibot_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Migrations are applied by the bot container's entrypoint via
      # `alembic upgrade head`; postgres no longer runs init scripts.
      # See alembic/README.md for how to stamp existing prod databases.
    healthcheck:
      # Make sure the bot doesn't try to connect before postgres has accepted
      # init scripts. -d guards against the pg_isready quirk where it returns
      # "ready" against the bootstrap DB during init.
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-botuser} -d ${DB_NAME:-aibot_db}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    # Backing store for aiogram FSM. Without this, a bot restart
    # while a user is in waiting_custom_amount / waiting_promo_code
    # would forget their state and they'd be stuck — see
    # main.build_fsm_storage().
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # Override DB_HOST regardless of what's in .env: inside the
      # compose network, the postgres container is reachable as the
      # service name.
      DB_HOST: postgres
      # Same idea for Redis: regardless of what (if anything) is in
      # .env, the compose network always uses the service name.
      REDIS_URL: redis://redis:6379/0
      # Force the listener to 8080 inside the container; published port
      # below maps it to whatever the operator wants on the host.
      WEBHOOK_PORT: "8080"
    ports:
      # Expose to localhost only — production should put nginx/Caddy/
      # Cloudflare Tunnel in front for TLS. NowPayments only needs to
      # reach ${WEBHOOK_BASE_URL}/nowpayments-webhook over HTTPS.
      - "127.0.0.1:${WEBHOOK_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
